name: Bug report
description: Report a reproducible TUIkit problem
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include a minimal code sample when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Swift version, OS, terminal, shell, TERM, tmux/screen, TUIkit version or commit.
      value: |
        - Swift:
        - OS:
        - Terminal:
        - Shell:
        - TERM:
        - tmux/screen:
        - TUIkit:
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Commands run, screenshots, terminal recordings, or release checklist results.
